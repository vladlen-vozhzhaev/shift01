<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Bootstrap demo</title>
        <script src="/socket.io/socket.io.js"></script>
    </head>
    <body>
        <div class="container mt-5">
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card text-white bg-primary">
                        <div class="card-body">
                            <h5 class="cart-title">Всего задач</h5>
                            <h2 class="card-text">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-white bg-success">
                        <div class="card-body">
                            <h5 class="cart-title">Выполнено</h5>
                            <h2 class="card-text">0</h2>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-white bg-warning">
                        <div class="card-body">
                            <h5 class="cart-title">Активных</h5>
                            <h2 class="card-text">0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="card mb-4">
                <div class="card-header">
                    <h5>Новая задача</h5>
                </div>
                <div class="card-body">
                    <form id="taskForm">
                        <div class="mb-3">
                            <label for="taskName">Название</label>
                            <input name="title" type="text" class="form-control" id="taskName" required placeholder="Название">
                        </div>
                        <div class="mb-3">
                            <label for="taskDescription">Описание</label>
                            <textarea name="description" class="form-control" id="taskDescription" placeholder="Описание"></textarea>
                        </div>
                        <div class="mb-3">
                            <input type="submit" class="form-control btn btn-primary">
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="card">
                <div class="card-header">
                    <h5>Список задач</h5>
                </div>
                <div class="card-body">
                    <div id="taskList">
                        <div class="text-center text-muted py-5">
                            <p>Нет задач. Добавьте первую задачу!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <script src="/app.js"></script>
    </body>
</html>
